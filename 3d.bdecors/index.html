      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

        <rect x="9" y="9" width="6" height="6"></rect>
        <line x1="9" y1="1" x2="9" y2="4"></line>
        <line x1="15" y1="1" x2="15" y2="4"></line>
        <line x1="9" y1="20" x2="9" y2="23"></line>
        <line x1="15" y1="20" x2="15" y2="23"></line>
        <line x1="20" y1="9" x2="23" y2="9"></line>
        <line x1="20" y1="14" x2="23" y2="14"></line>
        <line x1="1" y1="9" x2="4" y2="9"></line>
        <line x1="1" y1="14" x2="4" y2="14"></line>
      </svg>

    function PrintingWebsite() {
      const [formData, setFormData] = useState({
        name: '',
        email: '',
        phone: '',
        projectType: '',
        description: '',
        quantity: '1',
        material: 'PLA'
      });
      const [uploadedFiles, setUploadedFiles] = useState([]);
      const [submitted, setSubmitted] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [formErrors, setFormErrors] = useState({});
      const [cursorPos, setCursorPos] = useState({ x: 0, y: 0 });
      const [trail, setTrail] = useState([]);
      const [isHovering, setIsHovering] = useState(false);
      const [activeSection, setActiveSection] = useState('home');

      // Dynamic cursor with ribbon trail effect
      useEffect(() => {
        const handleMouseMove = (e) => {
          const newPos = { x: e.clientX, y: e.clientY, id: Date.now() };
          setCursorPos({ x: e.clientX, y: e.clientY });
          setTrail(prev => [...prev.slice(-50), newPos]);
        };
        window.addEventListener('mousemove', handleMouseMove);
        return () => window.removeEventListener('mousemove', handleMouseMove);
      }, []);

      // Clean up old trail points
      useEffect(() => {
        const interval = setInterval(() => {
          setTrail(prev => prev.slice(-40));
        }, 30);
        return () => clearInterval(interval);
      }, []);

      // Track active section on scroll
      useEffect(() => {
        const handleScroll = () => {
          const sections = ['home', 'services', 'technology', 'gallery', 'quote', 'contact'];
          for (const section of sections) {
            const element = document.getElementById(section);
            if (element) {
              const rect = element.getBoundingClientRect();
              if (rect.top <= 100 && rect.bottom >= 100) {
                setActiveSection(section);
                break;
              }
            }
          }
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const navItems = [
        { id: 'home', label: 'Home' },
        { id: 'services', label: 'Services' },
        { id: 'technology', label: 'Technology' },
        { id: 'gallery', label: 'Gallery' },
        { id: 'quote', label: 'Get Quote' },
        { id: 'contact', label: 'Contact' }
      ];

      const services = [
        {
          icon: <Printer className="w-8 h-8" />,
          title: "Rapid Prototyping",
          description: "Turn your concepts into reality within hours. Perfect for product development and testing."
        },
        {
          icon: <Box className="w-8 h-8" />,
          title: "Custom Parts Manufacturing",
          description: "Precision 3D printed parts for industrial, automotive, and consumer applications."
        },
        {
          icon: <Zap className="w-8 h-8" />,
          title: "AI-Powered 2D to 3D",
          description: "Upload a photo and we'll convert it to a printable 3D model using SUAPP AI technology."
        }
      ];

      const materials = [
        { name: 'PLA', description: 'Standard plastic, great for prototypes' },
        { name: 'ABS', description: 'Durable and heat resistant' },
        { name: 'PETG', description: 'Strong and flexible' },
        { name: 'Resin', description: 'High detail and smooth finish' },
        { name: 'Nylon', description: 'Industrial strength' }
      ];

      const sampleProducts = [
        { name: 'Custom Phone Cases', category: 'Consumer', image: '📱' },
        { name: 'Mechanical Parts', category: 'Industrial', image: '⚙️' },
        { name: 'Architectural Models', category: 'Architecture', image: '🏢' },
        { name: 'Product Prototypes', category: 'Design', image: '🎨' },
        { name: 'Medical Models', category: 'Healthcare', image: '🏥' },
        { name: 'Custom Figurines', category: 'Entertainment', image: '🎭' },
        { name: 'Jewelry & Accessories', category: 'Fashion', image: '💍' },
        { name: 'Automotive Parts', category: 'Automotive', image: '🚗' },
        { name: 'Drone Components', category: 'Aerospace', image: '🚁' },
        { name: 'Educational Models', category: 'Education', image: '🔬' },
        { name: 'Home Decor', category: 'Interior', image: '🏠' },
        { name: 'Replacement Parts', category: 'Repair', image: '🔧' },
        { name: 'Cosplay Props', category: 'Entertainment', image: '🎮' },
        { name: 'Custom Enclosures', category: 'Electronics', image: '💻' },
        { name: 'Signage & Displays', category: 'Marketing', image: '🪧' },
        { name: 'Sports Equipment', category: 'Sports', image: '⚽' },
        { name: 'Pet Accessories', category: 'Pets', image: '🐾' },
        { name: 'Kitchen Tools', category: 'Home', image: '🍳' }
      ];

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        setUploadedFiles(prev => [...prev, ...files.map(f => f.name)]);
      };

      const validateForm = () => {
        const errors = {};

        if (!formData.name.trim()) {
          errors.name = 'Name is required';
        }

        if (!formData.email.trim()) {
          errors.email = 'Email is required';
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
          errors.email = 'Please enter a valid email address';
        }

        if (!formData.projectType) {
          errors.projectType = 'Please select a project type';
        }

        if (!formData.description.trim()) {
          errors.description = 'Project description is required';
        }

        setFormErrors(errors);
        return Object.keys(errors).length === 0;
      };

      const handleSubmit = (e) => {
        e.preventDefault();

        if (!validateForm()) {
          return;
        }

        setIsSubmitting(true);

        // Let the form submit naturally after validation
        e.target.submit();
      };

      return (
        <div className="min-h-screen bg-blue-50 custom-cursor-wrapper cursor-none">
          {/* Custom Cursor - Small dot */}
          <div
            className="custom-cursor fixed pointer-events-none z-50"
            style={{
              left: cursorPos.x - 3,
              top: cursorPos.y - 3,
            }}
          >
            <div className="w-1.5 h-1.5 bg-cyan-600 rounded-full" />
          </div>

          {/* Ribbon Trail Effect - Cloth-like */}
          <svg
            className="custom-cursor-trail fixed pointer-events-none z-40 top-0 left-0 w-full h-full"
            style={{ overflow: 'visible' }}
          >
            <defs>
              <linearGradient id="ribbonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(34, 211, 238, 0.1)" />
                <stop offset="50%" stopColor="rgba(34, 211, 238, 0.6)" />
                <stop offset="100%" stopColor="rgba(34, 211, 238, 0.1)" />
              </linearGradient>
            </defs>
            {trail.length > 3 && (
              <>
                {/* Main ribbon body - wider cloth-like strip */}
                <path
                  d={trail.map((point, index) => 
                    index === 0 ? `M ${point.x} ${point.y}` : `L ${point.x} ${point.y}`
                  ).join(' ')}
                  stroke="url(#ribbonGradient)"
                  strokeWidth="25"
                  fill="none"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  style={{
                    opacity: trail.length > 0 ? Math.max(0, 1 - ((Date.now() - trail[0].id) / 3000)) : 0
                  }}
                />
                {/* Center line for definition */}
                <path
                  d={trail.map((point, index) => 
                    index === 0 ? `M ${point.x} ${point.y}` : `L ${point.x} ${point.y}`
                  ).join(' ')}
                  stroke="rgba(34, 211, 238, 0.8)"
                  strokeWidth="2"
                  fill="none"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  style={{
                    opacity: trail.length > 0 ? Math.max(0, 1 - ((Date.now() - trail[0].id) / 3000)) : 0
                  }}
                />
              </>
            )}
          </svg>

          {/* Header */}
          <header className="bg-white/95 backdrop-blur-md border-b border-cyan-200 sticky top-0 z-40 shadow-sm" role="banner">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <div className="flex justify-between items-center">
                <div className="flex items-center space-x-2">
                  <div className="relative" aria-hidden="true">
                    <Layers className="w-8 h-8 text-cyan-400" />
                    <div className="absolute -top-1 -right-1 w-3 h-3 bg-orange-500 rounded-full animate-pulse" />
                  </div>
                  <span className="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-orange-500 bg-clip-text text-transparent">
                    PrintPro 3D
                  </span>
                </div>

                {/* Navigation - Always visible horizontally */}
                <nav className="flex space-x-1 flex-1 justify-center" role="navigation" aria-label="Main navigation">
                  {navItems.map((item) => (
                    <a
                      key={item.id}
                      href={`#${item.id}`}
                      onMouseEnter={() => setIsHovering(true)}
                      onMouseLeave={() => setIsHovering(false)}
                      className={`px-3 py-2 rounded-lg text-sm font-medium transition-all duration-300 ${
                        activeSection === item.id
                          ? 'bg-cyan-100 text-cyan-700 border border-cyan-300'
                          : 'text-gray-700 hover:text-cyan-600 hover:bg-blue-50'
                      }`}
                    >
                      {item.label}
                    </a>
                  ))}
                </nav>

                <a
                  href="#quote"
                  onMouseEnter={() => setIsHovering(true)}
                  onMouseLeave={() => setIsHovering(false)}
                  className="bg-gradient-to-r from-cyan-500 to-cyan-600 text-white px-6 py-2 rounded-lg font-semibold hover:from-cyan-400 hover:to-cyan-500 transition-all duration-300 shadow-lg shadow-cyan-500/25"
                >
                  Request Quote
                </a>
              </div>
            </div>
          </header>

          {/* Hero Section */}
          <section id="home" className="relative bg-gradient-to-b from-blue-50 to-white text-gray-900 py-24 overflow-hidden" aria-label="Hero section">
            {/* Animated background grid */}
            <div className="absolute inset-0 opacity-20">
              <div className="absolute inset-0" style={{
                backgroundImage: 'linear-gradient(cyan 1px, transparent 1px), linear-gradient(90deg, cyan 1px, transparent 1px)',
                backgroundSize: '50px 50px'
              }} />
            </div>
            
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
              <div className="text-center">
                <div className="inline-flex items-center space-x-2 bg-white border border-cyan-200 rounded-full px-4 py-2 mb-6 shadow-sm">
                  <Cpu className="w-4 h-4 text-cyan-600" />
                  <span className="text-sm text-gray-700">Advanced 3D Printing Technology</span>
                </div>
                <h1 className="text-5xl md:text-7xl font-bold mb-6">
                  <span className="bg-gradient-to-r from-cyan-600 via-cyan-500 to-orange-500 bg-clip-text text-transparent">
                    Transform Ideas
                  </span>
                  <br />
                  <span className="text-gray-900">Into Reality</span>
                </h1>
                <p className="text-xl md:text-2xl mb-8 text-gray-600 max-w-3xl mx-auto">
                  Professional 3D printing services with AI-powered design tools.
                  From prototype to production in record time.
                </p>
                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                  <a
                    href="#quote"
                    onMouseEnter={() => setIsHovering(true)}
                    onMouseLeave={() => setIsHovering(false)}
                    className="bg-gradient-to-r from-cyan-500 to-cyan-600 text-white px-8 py-4 rounded-lg font-semibold hover:from-cyan-400 hover:to-cyan-500 transition-all duration-300 flex items-center justify-center shadow-lg shadow-cyan-500/25"
                  >
                    Get Instant Quote <ArrowRight className="ml-2 w-5 h-5" />
                  </a>
                  <a
                    href="#services"
                    onMouseEnter={() => setIsHovering(true)}
                    onMouseLeave={() => setIsHovering(false)}
                    className="border-2 border-orange-500/50 text-orange-600 px-8 py-4 rounded-lg font-semibold hover:bg-orange-50 hover:border-orange-500 transition-all duration-300"
                  >
                    Explore Services
                  </a>
                </div>
              </div>
            </div>
          </section>

          {/* Services Section */}
          <section id="services" className="py-20 bg-white" aria-labelledby="services-heading">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-16">
                <h2 id="services-heading" className="text-4xl font-bold text-gray-900 mb-4">Our Services</h2>
                <p className="text-xl text-gray-600">Cutting-edge 3D printing solutions for every need</p>
              </div>
              <div className="grid md:grid-cols-3 gap-8">
                {services.map((service, index) => (
                  <div
                    key={index}
                    onMouseEnter={() => setIsHovering(true)}
                    onMouseLeave={() => setIsHovering(false)}
                    className="bg-blue-50 border border-cyan-200 p-8 rounded-xl hover:border-cyan-400 hover:shadow-lg hover:shadow-cyan-500/10 transition-all duration-300 group"
                  >
                    <div className="text-cyan-600 mb-4 group-hover:scale-110 transition-transform duration-300">{service.icon}</div>
                    <h3 className="text-2xl font-bold text-gray-900 mb-3">{service.title}</h3>
                    <p className="text-gray-600">{service.description}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* AI Technology Highlight */}
          <section id="technology" className="py-16 bg-blue-50" aria-labelledby="technology-heading">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="bg-gradient-to-br from-white to-blue-50 border border-cyan-200 rounded-2xl shadow-xl p-8 md:p-12">
                <div className="grid md:grid-cols-2 gap-8 items-center">
                  <div>
                    <h2 id="technology-heading" className="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
                      2D Photo to 3D Model in Minutes
                    </h2>
                    <p className="text-lg text-gray-600 mb-6">
                      Our advanced AI technology converts any 2D image into a printable 3D model. 
                      Simply upload a photo, and we'll handle the rest.
                    </p>
                    <ul className="space-y-3">
                      <li className="flex items-start">
                        <Check className="w-6 h-6 text-cyan-600 mr-3 flex-shrink-0 mt-0.5" />
                        <span className="text-gray-700">Instant 2D to 3D conversion</span>
                      </li>
                      <li className="flex items-start">
                        <Check className="w-6 h-6 text-cyan-600 mr-3 flex-shrink-0 mt-0.5" />
                        <span className="text-gray-700">Print-ready models in hours</span>
                      </li>
                      <li className="flex items-start">
                        <Check className="w-6 h-6 text-cyan-600 mr-3 flex-shrink-0 mt-0.5" />
                        <span className="text-gray-700">Professional quality guarantee</span>
                      </li>
                    </ul>
                  </div>
                  <div className="bg-white border border-orange-300 rounded-xl p-8 text-center shadow-md">
                    <div className="text-6xl mb-4">📸 → 🎨 → 🖨️</div>
                    <p className="text-gray-700 font-medium">Upload → AI Converts → We Print</p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Product Gallery */}
          <section id="gallery" className="py-20 bg-white" aria-labelledby="gallery-heading">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-16">
                <h2 id="gallery-heading" className="text-4xl font-bold text-gray-900 mb-4">What We Can Print</h2>
                <p className="text-xl text-gray-600">From prototypes to production parts</p>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                {sampleProducts.map((product, index) => (
                  <div
                    key={index}
                    onMouseEnter={() => setIsHovering(true)}
                    onMouseLeave={() => setIsHovering(false)}
                    className="bg-blue-50 border border-cyan-200 rounded-lg p-4 hover:border-cyan-400 hover:shadow-lg hover:shadow-cyan-500/10 transition-all duration-300 text-center group"
                  >
                    <div className="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">{product.image}</div>
                    <h3 className="font-bold text-gray-900 text-sm mb-1">{product.name}</h3>
                    <span className="text-xs text-cyan-600 font-medium">{product.category}</span>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Quote Request Form */}
          <section id="quote" className="py-20 bg-blue-50" aria-labelledby="quote-heading">
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-12">
                <h2 id="quote-heading" className="text-4xl font-bold text-gray-900 mb-4">Request a Quote</h2>
                <p className="text-xl text-gray-600">Tell us about your project and we'll get back to you within 24 hours</p>
              </div>

              {submitted ? (
                <div className="bg-white border border-cyan-300 rounded-lg p-8 text-center shadow-lg">
                  <div className="text-cyan-600 mb-4">
                    <Check className="w-16 h-16 mx-auto" />
                  </div>
                  <h3 className="text-2xl font-bold text-gray-900 mb-2">Quote Request Submitted!</h3>
                  <p className="text-gray-600">We'll review your project and send you a detailed quote within 24 hours.</p>
                </div>
              ) : (
                <form name="quote-request" method="POST" data-netlify="true" action="/thank-you.html" onSubmit={handleSubmit} className="bg-white border border-cyan-200 rounded-2xl p-8 space-y-6 shadow-lg">
                  {/* Hidden fields for Netlify Forms */}
                  <input type="hidden" name="form-name" value="quote-request" />
                  <p className="hidden">
                    <label>Don't fill this out if you're human: <input name="bot-field" /></label>
                  </p>

                  <div className="grid md:grid-cols-2 gap-6">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        Full Name *
                      </label>
                      <input
                        type="text"
                        name="name"
                        required
                        value={formData.name}
                        onChange={handleInputChange}
                        className={`w-full px-4 py-3 bg-white border rounded-lg text-gray-900 placeholder-gray-400 focus:ring-2 focus:ring-cyan-500 focus:border-transparent ${formErrors.name ? 'border-red-500' : 'border-gray-300'}`}
                        placeholder="Abdulah Hamad"
                        disabled={isSubmitting}
                      />
                      {formErrors.name && <p className="mt-1 text-sm text-red-600">{formErrors.name}</p>}
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        Email *
                      </label>
                      <input
                        type="email"
                        name="email"
                        required
                        value={formData.email}
                        onChange={handleInputChange}
                        className={`w-full px-4 py-3 bg-white border rounded-lg text-gray-900 placeholder-gray-400 focus:ring-2 focus:ring-cyan-500 focus:border-transparent ${formErrors.email ? 'border-red-500' : 'border-gray-300'}`}
                        placeholder="Abdulah@Example.com"
                        disabled={isSubmitting}
                      />
                      {formErrors.email && <p className="mt-1 text-sm text-red-600">{formErrors.email}</p>}
                    </div>
                  </div>

                  <div className="grid md:grid-cols-2 gap-6">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        Phone
                      </label>
                      <input
                        type="tel"
                        name="phone"
                        value={formData.phone}
                        onChange={handleInputChange}
                        className="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        placeholder="055 555 5555"
                        disabled={isSubmitting}
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        Project Type *
                      </label>
                      <select
                        name="projectType"
                        required
                        value={formData.projectType}
                        onChange={handleInputChange}
                        className={`w-full px-4 py-3 bg-white border rounded-lg text-gray-900 focus:ring-2 focus:ring-cyan-500 focus:border-transparent ${formErrors.projectType ? 'border-red-500' : 'border-gray-300'}`}
                        disabled={isSubmitting}
                      >
                        <option value="">Select type</option>
                        <option value="prototype">Prototype</option>
                        <option value="production">Production Run</option>
                        <option value="2d-to-3d">2D to 3D Conversion</option>
                        <option value="custom">Custom Part</option>
                        <option value="other">Other</option>
                      </select>
                      {formErrors.projectType && <p className="mt-1 text-sm text-red-600">{formErrors.projectType}</p>}
                    </div>
                  </div>

                  <div className="grid md:grid-cols-2 gap-6">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        Material Preference
                      </label>
                      <select
                        name="material"
                        value={formData.material}
                        onChange={handleInputChange}
                        className="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-gray-900 focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        disabled={isSubmitting}
                      >
                        {materials.map(mat => (
                          <option key={mat.name} value={mat.name}>
                            {mat.name} - {mat.description}
                          </option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        Quantity
                      </label>
                      <input
                        type="number"
                        name="quantity"
                        min="1"
                        value={formData.quantity}
                        onChange={handleInputChange}
                        className="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-gray-900 focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        disabled={isSubmitting}
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">
                      Project Description *
                    </label>
                    <textarea
                      name="description"
                      required
                      value={formData.description}
                      onChange={handleInputChange}
                      rows={4}
                      className={`w-full px-4 py-3 bg-white border rounded-lg text-gray-900 placeholder-gray-400 focus:ring-2 focus:ring-cyan-500 focus:border-transparent ${formErrors.description ? 'border-red-500' : 'border-gray-300'}`}
                      placeholder="Describe your project, dimensions, special requirements, etc."
                      disabled={isSubmitting}
                    />
                    {formErrors.description && <p className="mt-1 text-sm text-red-600">{formErrors.description}</p>}
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">
                      Upload Files (Images, CAD files, or references)
                    </label>
                    <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-cyan-400 transition bg-white">
                      <input
                        type="file"
                        name="files"
                        multiple
                        onChange={handleFileUpload}
                        className="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-gray-900 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cyan-50 file:text-cyan-700 hover:file:bg-cyan-100"
                        id="file-upload"
                        accept="image/*,.stl,.obj,.step,.stp"
                        data-netlify="true"
                      />
                      <div className="mt-4">
                        <Upload className="w-12 h-12 text-gray-400 mx-auto mb-2" />
                        <p className="text-sm text-gray-500">PNG, JPG, STL, OBJ, STEP files</p>
                      </div>
                      {uploadedFiles.length > 0 && (
                        <div className="mt-4 text-left">
                          <p className="font-semibold text-gray-700 mb-2">Selected files:</p>
                          <ul className="space-y-1">
                            {uploadedFiles.map((file, idx) => (
                              <li key={idx} className="text-sm text-gray-600 flex items-center">
                                <Check className="w-4 h-4 text-cyan-600 mr-2" />
                                {file}
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}
                    </div>
                  </div>

                  <button
                    type="submit"
                    onMouseEnter={() => setIsHovering(true)}
                    onMouseLeave={() => setIsHovering(false)}
                    disabled={isSubmitting}
                    className={`w-full py-4 rounded-lg font-semibold text-lg transition-all duration-300 flex items-center justify-center shadow-lg ${
                      isSubmitting
                        ? 'bg-gray-400 cursor-not-allowed'
                        : 'bg-gradient-to-r from-cyan-500 to-cyan-600 text-white hover:from-cyan-400 hover:to-cyan-500 shadow-cyan-500/25'
                    }`}
                  >
                    {isSubmitting ? (
                      <>
                        <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Submitting...
                      </>
                    ) : (
                      <>
                        Submit Quote Request <ArrowRight className="ml-2 w-5 h-5" />
                      </>
                    )}
                  </button>
                </form>
              )}
            </div>
          </section>

          {/* Contact Section */}
          <section id="contact" className="py-16 bg-white border-t border-gray-200" aria-labelledby="contact-heading" role="contentinfo">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="grid md:grid-cols-3 gap-8">
                <div>
                  <div className="flex items-center space-x-2 mb-4">
                    <Layers className="w-6 h-6 text-cyan-600" />
                    <span className="text-xl font-bold bg-gradient-to-r from-cyan-600 to-orange-500 bg-clip-text text-transparent">
                      PrintPro 3D
                    </span>
                  </div>
                  <p className="text-gray-600">
                    Professional 3D printing services with cutting-edge AI technology.
                  </p>
                </div>
                <div>
                  <h4 className="font-semibold text-gray-900 mb-4">Contact Us</h4>
                  <div className="space-y-3 text-gray-600">
                    <div className="flex items-center">
                      <Mail className="w-5 h-5 mr-3 text-cyan-600" />
                      <span>3d@bdecors.com</span>
                    </div>
                    <div className="flex items-center">
                      <Phone className="w-5 h-5 mr-3 text-cyan-600" />
                      <span>0568400053</span>
                    </div>
                  </div>
                </div>
                <div>
                  <h4 className="font-semibold text-gray-900 mb-4">Quick Links</h4>
                  <ul className="space-y-2 text-gray-600">
                    <li><a href="#services" className="hover:text-cyan-600 transition">Services</a></li>
                    <li><a href="#gallery" className="hover:text-cyan-600 transition">Gallery</a></li>
                    <li><a href="#quote" className="hover:text-cyan-600 transition">Get Quote</a></li>
                  </ul>
                </div>
              </div>
              <div className="border-t border-gray-200 mt-12 pt-8 text-center text-gray-500">
                <p>&copy; 2025 PrintPro 3D. All rights reserved.</p>
              </div>
            </div>
          </section>
        </div>
      );
    }

    ReactDOM.render(<PrintingWebsite />, document.getElementById('root'));
  </script>
</body>
</html>
